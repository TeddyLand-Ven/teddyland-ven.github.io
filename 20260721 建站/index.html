<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛绒梦工坊 - 温暖你的每一天</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">🧸 毛绒梦工坊</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">首页</a></li>
            <li><a href="products.html">产品汇集</a></li>
            <li><a href="about.html">关于我们</a></li>
            <li><a href="contact.html">联系我们</a></li>
        </ul>
        <div class="hamburger">☰</div>
    </nav>

    <!-- 首页大图 -->
    <header class="hero">
        <div class="hero-content">
            <h1>欢迎来到毛绒梦工坊</h1>
            <p>每一个毛绒玩具，都承载着一个温暖的梦</p>
            <a href="products.html" class="btn-primary">浏览产品</a>
        </div>
    </header>

    <!-- 产品分类预览 -->
    <section class="categories">
        <h2>我们的产品分类</h2>
        <div class="category-grid">
            <div class="category-card" onclick="location.href='products.html#characters'">
                <div class="category-icon">🧸</div>
                <h3>玩偶角色图案汇集</h3>
                <p>经典卡通角色、原创设计玩偶</p>
            </div>
            <div class="category-card" onclick="location.href='products.html#clothes'">
                <div class="category-icon">👗</div>
                <h3>玩偶衣服汇集</h3>
                <p>精美娃衣、配饰套装</p>
            </div>
            <div class="category-card" onclick="location.href='products.html#souvenirs'">
                <div class="category-icon">🎁</div>
                <h3>纪念品汇集</h3>
                <p>限定款、节日特典、收藏系列</p>
            </div>
        </div>
    </section>

    <!-- 店铺信息预览 -->
    <section class="store-preview">
        <h2>我们的店铺</h2>
        <div class="store-info">
            <div class="store-text">
                <h3>📍 店面位置</h3>
                <p>北京市朝阳区三里屯太古里南区 S2-11</p>
                <p>地铁10号线团结湖站 A出口 步行5分钟</p>
                <p>营业时间：每日 10:00 - 22:00</p>
                <a href="about.html" class="btn-secondary">查看详情</a>
            </div>
            <div class="store-map">
                <!-- 这里放店铺图片，使用图床链接 -->
                <img src="https://via.placeholder.com/400x300/ff9ecd/ffffff?text=店铺外观照片" alt="店铺外观" id="store-img">
                <p class="upload-tip">⬆️ 点击图片区域，替换为你的店铺照片</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <p>毛绒梦工坊 © 2026 | 温暖你的每一天 🧸</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
